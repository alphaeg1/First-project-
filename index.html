<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha | الرئيسية</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #00d4ff; /* Neon Blue */
            --secondary-accent: #9d00ff; /* Neon Purple */
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* Hero Header */
        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(45deg, #0a0a0a 30%, #1a1a2e 100%);
            border-bottom: 2px solid var(--accent-color);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        header h1 {
            font-size: 4rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--accent-color);
        }

        /* Container & Sections */
        .container {
            max-width: 1100px;
            margin: auto;
            padding: 40px 20px;
        }

        .section {
            margin-bottom: 60px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Social Icons */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 30px;
        }

        .social-icons a {
            color: var(--text-primary);
            font-size: 24px;
            text-decoration: none;
            transition: 0.3s;
            padding: 10px;
            border: 1px solid var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
        }

        .social-icons a:hover {
            background: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color);
            color: #000;
        }

        /* Responsive Map */
        .map-container {
            width: 100%;
            height: 400px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--secondary-accent);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            filter: grayscale(100%) invert(90%) contrast(90%);
        }

        /* Responsive Layout */
        @media (max-width: 768px) {
            header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>ALPHA</h1>
        <p style="color: var(--accent-color);">Your Gateway to the Future</p>
    </header>

    <div class="container">
        <div class="section">
            <h2>عن الشركة</h2>
            <p>نحن نقدم أحدث الحلول التقنية في مجال الـ NFC والتسويق الرقمي بلمسة عصرية وتصميمات مبتكرة.</p>
        </div>

        <div class="section">
            <h2>موقعنا</h2>
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3456.123456789!2d31.2357!3d30.0444!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzDCsDAyJzQwLjAiTiAzMcKwMTQnMDguNSJF!5e0!3m2!1sen!2seg!4v1620000000000!5m2!1sen!2seg"></iframe>
            </div>
        </div>

        <div class="social-icons">
            <a href="#" title="Facebook">FB</a>
            <a href="#" title="Instagram">IG</a>
            <a href="#" title="WhatsApp">WA</a>
            <a href="#" title="LinkedIn">IN</a>
        </div>
    </div>

</body>
</html>
