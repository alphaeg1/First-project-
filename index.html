<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="countdown-bar">
        <span>فاضل على حلمك: </span>
        <div id="timer">
            <span id="days">00</span> يوم : 
            <span id="hours">00</span> ساعة : 
            <span id="minutes">00</span> دقيقة : 
            <span id="seconds">00</span> ثانية
        </div>
    </div>

    <nav class="top-nav">
        <div class="user-info">
            <div class="profile-pic">A</div>
            <span>أهلاً، <strong>أحمد</strong></span>
        </div>
        <div class="logo">AHMED</div>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="card neon-purple">
                <h3>0</h3>
                <p>كورس مكتمل</p>
            </div>
            <div class="card neon-pink">
                <h3>1</h3>
                <p>كورس حالي</p>
            </div>
            <div class="card neon-blue">
                <h3>0</h3>
                <p>فيديوهات محفوظة</p>
            </div>
        </div>

        <div class="course-section">
            <h2>الكورسات اللي مشترك فيها</h2>
            <div class="course-card">
                <div class="course-img">
                    <img src="https://via.placeholder.com/400x200" alt="Course">
                </div>
                <div class="course-details">
                    <h3>كورس المراجعة النهائية (أحياء + جيولوجيا)</h3>
                    <button class="entry-btn">الدخول للكورس</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
